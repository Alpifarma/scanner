<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0a0a">
<title>Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #0a0a0a;
  --s1:       #111827;
  --s2:       #1a2332;
  --s3:       #243040;
  --border:   rgba(255,255,255,.07);
  --green:    #007853;
  --green-hi: #00c47a;
  --green-dk: #1e2d26;
  --tx:       #f1f5f9;
  --tx-dim:   #64748b;
  --tx-mid:   #94a3b8;
  --red:      #ef4444;
  --mono:     'Courier New', monospace;
  --radius:   14px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ───────────────────────────────────────────── */
#app {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── HEADER ───────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 12px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.logo {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -.5px;
  color: var(--tx);
  flex: 1;
}
.logo span { color: var(--green-hi); }
.header-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx-mid);
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-variant-numeric: tabular-nums;
}
.header-count strong { color: var(--green-hi); font-weight: 700; }
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--tx-mid);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s, color .15s;
}
.icon-btn:active { background: var(--s3); color: var(--tx); }

/* ── VIDEO ZONE ───────────────────────────────────────── */
.video-zone {
  position: relative;
  flex: 0 0 auto;
  background: #000;
  overflow: hidden;
}
#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Scan frame */
.scan-frame {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.sf-inner {
  width: min(72vw, 280px);
  aspect-ratio: 2.2 / 1;
  position: relative;
}
.sf-corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--green-hi);
  border-style: solid;
  opacity: .9;
}
.sf-corner.tl { top:0; left:0; border-width:2.5px 0 0 2.5px; border-radius:3px 0 0 0; }
.sf-corner.tr { top:0; right:0; border-width:2.5px 2.5px 0 0; border-radius:0 3px 0 0; }
.sf-corner.bl { bottom:0; left:0; border-width:0 0 2.5px 2.5px; border-radius:0 0 0 3px; }
.sf-corner.br { bottom:0; right:0; border-width:0 2.5px 2.5px 0; border-radius:0 0 3px 0; }
.sf-line {
  position: absolute;
  left: 0; right: 0;
  height: 1.5px;
  background: linear-gradient(90deg, transparent 0%, var(--green-hi) 30%, var(--green-hi) 70%, transparent 100%);
  animation: sweep 2s ease-in-out infinite;
}
@keyframes sweep {
  0%, 100% { top: 0; opacity: .4; }
  50% { top: calc(100% - 2px); opacity: .9; }
}

/* Flash on scan */
.scan-flash {
  position: absolute;
  inset: 0;
  background: var(--green-hi);
  opacity: 0;
  pointer-events: none;
}
.scan-flash.pop { animation: flash-pop .28s ease-out forwards; }
@keyframes flash-pop { 0%{opacity:.35} 100%{opacity:0} }

/* Start screen */
.cam-idle {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: rgba(0,0,0,.92);
}
.cam-idle.gone { display: none; }
.cam-idle-icon {
  font-size: 52px;
  filter: grayscale(.4);
}
.start-btn {
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 15px 36px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: -.2px;
  transition: background .15s, transform .1s;
}
.start-btn:active { background: #005c3f; transform: scale(.97); }
.cam-idle-sub {
  color: var(--tx-dim);
  font-size: 12px;
  text-align: center;
  max-width: 240px;
  line-height: 1.5;
}

/* ── BOTTOM PANEL ─────────────────────────────────────── */
.bottom-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Controls row */
.controls {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ctrl-btn {
  flex: 1;
  border: none;
  border-radius: 10px;
  padding: 10px 6px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: opacity .15s, transform .1s;
}
.ctrl-btn:active { opacity:.75; transform:scale(.97); }
.ctrl-start { background: var(--green); color: #fff; }
.ctrl-start.active { background: #1a3d2e; color: var(--green-hi); border: 1px solid var(--green); }
.ctrl-flip  { background: var(--s2); color: var(--tx-mid); border: 1px solid var(--border); }
.ctrl-list  { background: var(--s2); color: var(--tx-mid); border: 1px solid var(--border); }
.ctrl-list.has-items { color: var(--green-hi); border-color: var(--green); }

/* Manual input */
.manual-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.manual-input {
  flex: 1;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--tx);
  font-family: var(--mono);
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .2s;
}
.manual-input::placeholder { color: var(--tx-dim); }
.manual-input:focus { border-color: var(--green); }
.manual-add {
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 18px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.manual-add:active { background: #005c3f; }

/* Last scan ticker */
.last-ticker {
  padding: 8px 14px;
  background: var(--green-dk);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  min-height: 36px;
  transition: opacity .3s;
}
.last-ticker.empty { opacity: .4; }
.ticker-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green-hi);
  flex-shrink: 0;
}
.ticker-code {
  flex: 1;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--green-hi);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ticker-qty {
  font-size: 12px;
  font-weight: 700;
  color: var(--tx-dim);
  font-variant-numeric: tabular-nums;
}

/* ── LIST PANEL ────────────────────────────────────────── */
.list-panel {
  position: absolute;
  inset: 0;
  z-index: 50;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.32,1,.68,1);
  will-change: transform;
}
.list-panel.open { transform: translateY(0); }

.list-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 14px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.list-title { font-size: 17px; font-weight: 700; flex:1; }
.list-title span { color: var(--green-hi); margin-left: 6px; font-size: 14px; font-weight: 600; }
.list-actions { display: flex; gap: 8px; }
.list-action-btn {
  border: none;
  border-radius: 9px;
  padding: 7px 14px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.list-action-btn:active { opacity:.7; }
.btn-export { background: var(--green); color: #fff; }
.btn-clear  { background: var(--s2); color: var(--red); border: 1px solid var(--border); }
.btn-close  { background: var(--s2); color: var(--tx-mid); border: 1px solid var(--border); }

.list-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.list-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  height: 100%;
  color: var(--tx-dim);
  font-size: 14px;
}
.list-empty-icon { font-size: 44px; filter: grayscale(.3); }

.list-item {
  display: flex;
  align-items: center;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  animation: item-in .2s ease;
}
@keyframes item-in { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
.item-code {
  flex: 1;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--tx);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.item-qty-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 44px;
  height: 36px;
  background: var(--green-dk);
  border-radius: 9px;
  border: 1px solid rgba(0,196,122,.15);
}
.item-qty {
  font-size: 16px;
  font-weight: 700;
  color: var(--green-hi);
  font-variant-numeric: tabular-nums;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
}
.item-qty.bump { transform: scale(1.4); }
.item-del {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--tx-dim);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.item-del:active { background: var(--red); color: #fff; border-color: var(--red); }

/* Safe area spacer for list */
.list-safe { height: calc(var(--safe-b) + 16px); flex-shrink: 0; }

/* ── TOAST ─────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(var(--safe-b) + 24px);
  left: 50%;
  transform: translateX(-50%) translateY(24px);
  background: var(--s3);
  border: 1px solid var(--border);
  color: var(--tx);
  border-radius: 24px;
  padding: 10px 22px;
  font-size: 14px;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  transition: opacity .2s, transform .25s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  pointer-events: none;
  backdrop-filter: blur(8px);
}
.toast.ok   { border-color: rgba(0,196,122,.4); color: var(--green-hi); }
.toast.err  { border-color: rgba(239,68,68,.4); color: #fca5a5; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CONFIRM SHEET ─────────────────────────────────────── */
.sheet-ov {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 150;
  display: none;
  align-items: flex-end;
}
.sheet-ov.open { display: flex; }
.sheet {
  background: var(--s1);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(var(--safe-b) + 28px);
  width: 100%;
  border-top: 1px solid var(--border);
}
.sheet h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.sheet p  { color: var(--tx-mid); font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
.sheet-btns { display: flex; gap: 10px; }
.sheet-btn {
  flex: 1; padding: 14px;
  border-radius: 12px;
  font-family: inherit;
  font-size: 16px; font-weight: 700;
  border: none; cursor: pointer;
}
.sheet-cancel  { background: var(--s2); color: var(--tx); }
.sheet-confirm { background: var(--red); color: #fff; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">scan<span>.</span></div>
    <div class="header-count" id="headerCount"><strong>0</strong> codici</div>
    <button class="icon-btn" id="flipBtn" onclick="flipCamera()" title="Cambia camera">⟳</button>
  </header>

  <!-- VIDEO ZONE -->
  <div class="video-zone" id="videoZone">
    <video id="video" playsinline muted onclick="tapFocus(event)"></video>

    <div class="scan-frame">
      <div class="sf-inner">
        <div class="sf-corner tl"></div>
        <div class="sf-corner tr"></div>
        <div class="sf-corner bl"></div>
        <div class="sf-corner br"></div>
        <div class="sf-line"></div>
      </div>
    </div>

    <div class="scan-flash" id="scanFlash"></div>

    <div class="cam-idle" id="camIdle">
      <div class="cam-idle-icon">📷</div>
      <button class="start-btn" onclick="startCamera()">Avvia fotocamera</button>
      <div class="cam-idle-sub">Richiede connessione internet per caricare il lettore barcode</div>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn ctrl-start" id="btnStart" onclick="toggleCamera()">
        <span id="btnStartIcon">▶</span>
        <span id="btnStartLabel">Avvia</span>
      </button>
      <button class="ctrl-btn ctrl-flip" id="btnTorch" onclick="toggleTorch()">🔦 Torcia</button>
      <button class="ctrl-btn ctrl-flip" onclick="flipCamera()">
        ⟳ Camera
      </button>
      <button class="ctrl-btn ctrl-list" id="btnList" onclick="openList()">
        ☰ Lista
      </button>
    </div>

    <!-- Manual input -->
    <div class="manual-row">
      <input class="manual-input" id="manualInput"
             type="text" inputmode="numeric"
             placeholder="Inserisci codice manualmente…"
             onkeydown="if(event.key==='Enter')addManual()">
      <button class="manual-add" onclick="addManual()">Aggiungi</button>
    </div>

    <!-- Last scan ticker -->
    <div class="last-ticker empty" id="ticker">
      <div class="ticker-dot"></div>
      <div class="ticker-code" id="tickerCode">In attesa di scansione…</div>
      <div class="ticker-qty" id="tickerQty"></div>
    </div>

  </div>

</div><!-- /#app -->

<!-- LIST PANEL (slide up) -->
<div class="list-panel" id="listPanel">
  <div class="list-header">
    <div class="list-title">Lista codici <span id="listCount">0</span></div>
    <div class="list-actions">
      <button class="list-action-btn btn-export" onclick="exportCSV()">⬇ CSV</button>
      <button class="list-action-btn btn-clear"  onclick="askClear()">🗑</button>
      <button class="list-action-btn btn-close"  onclick="closeList()">✕</button>
    </div>
  </div>
  <div class="list-scroll" id="listScroll">
    <div class="list-empty" id="listEmpty">
      <div class="list-empty-icon">📋</div>
      <div>Nessun codice ancora.<br>Inizia a scansionare.</div>
    </div>
  </div>
  <div class="list-safe"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM SHEET -->
<div class="sheet-ov" id="sheetOv">
  <div class="sheet">
    <h3>Svuota lista</h3>
    <p>Tutti i codici verranno eliminati definitivamente. L'operazione non può essere annullata.</p>
    <div class="sheet-btns">
      <button class="sheet-btn sheet-cancel"  onclick="closeSheet()">Annulla</button>
      <button class="sheet-btn sheet-confirm" onclick="doClear()">Elimina tutto</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── STATE ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'scanner_v1';
let items = {};          // { code: qty }
let itemOrder = [];      // insertion order
let reader = null;
let cameras = [];
let camIdx = 0;
let running = false;
let lastVal = null;
let lastValTime = 0;
const DEBOUNCE_MS = 1800;

// Load persisted data
try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const parsed = JSON.parse(raw);
    items = parsed.items || {};
    itemOrder = parsed.order || Object.keys(items);
  }
} catch(e) {}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, order: itemOrder }));
  } catch(e) {}
}

// ── VIDEO HEIGHT ───────────────────────────────────────────────────
function setVideoHeight() {
  const vh = window.innerHeight || document.documentElement.clientHeight;
  // 42% of viewport, min 160, max 280
  const h = Math.max(160, Math.min(280, Math.round(vh * 0.42)));
  document.getElementById('videoZone').style.height = h + 'px';
}
setVideoHeight();
window.addEventListener('resize', setVideoHeight);

// ── CAMERA ────────────────────────────────────────────────────────
async function ensureReader() {
  if (reader) return true;
  if (!window.ZXing) {
    toast('ZXing non caricato — verifica connessione internet', 'err');
    return false;
  }
  try {
    reader = new ZXing.BrowserMultiFormatReader();
    cameras = await ZXing.BrowserCodeReader.listVideoInputDevices();
    // prefer rear camera
    const rearIdx = cameras.findIndex(c =>
      /back|rear|environment|post/i.test(c.label));
    if (rearIdx >= 0) camIdx = rearIdx;
    return true;
  } catch(e) {
    toast('Errore inizializzazione lettore', 'err');
    return false;
  }
}

async function startCamera() {
  const ok = await ensureReader();
  if (!ok) return;

  try {
    const deviceId = cameras[camIdx]?.deviceId;

    // Constraints con autofocus continuo ravvicinato
    const constraints = {
      video: {
        ...(deviceId ? { deviceId: { exact: deviceId } } : { facingMode: { ideal: 'environment' } }),
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode:        { ideal: 'continuous' },
        focusDistance:    { ideal: 0.1, min: 0.05 },
        exposureMode:     { ideal: 'continuous' },
        whiteBalanceMode: { ideal: 'continuous' },
      }
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);

    // Prova ad applicare advanced constraints (supportate su Chrome Android)
    const track = stream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
      try {
        await track.applyConstraints({
          advanced: [
            { focusMode: 'continuous' },
            { focusDistance: 0.1 }
          ]
        });
      } catch(e) { /* ignora se non supportato */ }
    }

    await reader.decodeFromStream(stream, 'video', onDecode);
    running = true;
    document.getElementById('camIdle').classList.add('gone');
    updateStartBtn();
    toast('Fotocamera attiva — inquadra il barcode', 'ok');
  } catch(e) {
    running = false;
    if (e.name === 'NotAllowedError') {
      toast('Permesso negato — sblocca la fotocamera nel browser', 'err');
    } else {
      toast('Fotocamera non disponibile', 'err');
    }
  }
}

function stopCamera() {
  if (reader) reader.reset();
  running = false;
  document.getElementById('camIdle').classList.remove('gone');
  updateStartBtn();
}

function toggleCamera() {
  if (running) stopCamera();
  else startCamera();
}

async function flipCamera() {
  if (!cameras.length) await ensureReader();
  if (cameras.length <= 1) { toast('Una sola camera disponibile', 'err'); return; }
  camIdx = (camIdx + 1) % cameras.length;
  if (running) { stopCamera(); setTimeout(startCamera, 200); }
  else { toast('Camera ' + (camIdx + 1) + ' / ' + cameras.length); }
}

// Tap-to-focus: forza il fuoco sul punto toccato
async function tapFocus(e) {
  const video = document.getElementById('video');
  const stream = video.srcObject;
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  if (!track) return;
  const caps = track.getCapabilities ? track.getCapabilities() : {};
  if (!caps.focusMode) return;

  try {
    const rect = video.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const constraints = { focusMode: 'manual' };
    if (caps.pointsOfInterest) constraints.pointsOfInterest = [{ x, y }];
    await track.applyConstraints({ advanced: [constraints] });
    // torna a continuous dopo 2s
    setTimeout(async () => {
      try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch(e) {}
    }, 2000);
    // feedback visivo
    showFocusDot(e.clientX, e.clientY);
  } catch(err) {}
}

function showFocusDot(cx, cy) {
  let dot = document.getElementById('focusDot');
  if (!dot) {
    dot = document.createElement('div');
    dot.id = 'focusDot';
    dot.style.cssText = 'position:fixed;width:44px;height:44px;border:2px solid #00c47a;border-radius:50%;pointer-events:none;z-index:99;transform:translate(-50%,-50%);transition:opacity .4s;';
    document.body.appendChild(dot);
  }
  dot.style.left = cx + 'px';
  dot.style.top = cy + 'px';
  dot.style.opacity = '1';
  clearTimeout(dot._t);
  dot._t = setTimeout(() => { dot.style.opacity = '0'; }, 700);
}

let torchOn = false;
async function toggleTorch() {
  const video = document.getElementById('video');
  const stream = video.srcObject;
  if (!stream) { toast('Avvia la fotocamera prima', 'err'); return; }
  const track = stream.getVideoTracks()[0];
  if (!track) return;
  const caps = track.getCapabilities ? track.getCapabilities() : {};
  if (!caps.torch) { toast('Torcia non disponibile su questo dispositivo', 'err'); return; }
  torchOn = !torchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('btnTorch').style.color = torchOn ? '#00c47a' : '';
    toast(torchOn ? 'Torcia accesa' : 'Torcia spenta', 'ok');
  } catch(e) {
    toast('Torcia non controllabile', 'err');
    torchOn = false;
  }
}

function updateStartBtn() {
  const btn = document.getElementById('btnStart');
  const icon = document.getElementById('btnStartIcon');
  const label = document.getElementById('btnStartLabel');
  if (running) {
    btn.classList.add('active');
    icon.textContent = '■';
    label.textContent = 'Stop';
  } else {
    btn.classList.remove('active');
    icon.textContent = '▶';
    label.textContent = 'Avvia';
  }
}

function onDecode(result, err) {
  if (!result) return;
  const val = result.getText();
  const now = Date.now();
  if (val === lastVal && (now - lastValTime) < DEBOUNCE_MS) return;
  lastVal = val;
  lastValTime = now;
  addCode(val);
  doFlash();
  try { navigator.vibrate && navigator.vibrate(55); } catch(e) {}
}

function doFlash() {
  const f = document.getElementById('scanFlash');
  f.classList.remove('pop');
  void f.offsetWidth;
  f.classList.add('pop');
}

// ── ADD CODE ──────────────────────────────────────────────────────
function addCode(code) {
  code = String(code).trim();
  if (!code) return;

  const isNew = !items[code];
  items[code] = (items[code] || 0) + 1;
  if (isNew) itemOrder.push(code);

  persist();
  updateHeader();
  updateTicker(code, items[code]);
  updateListBtn();

  if (listOpen) renderList();

  // bump animation on existing item in list
  if (!isNew && listOpen) {
    const qtyEl = document.querySelector(`[data-code="${CSS.escape(code)}"] .item-qty`);
    if (qtyEl) {
      qtyEl.classList.remove('bump');
      void qtyEl.offsetWidth;
      qtyEl.classList.add('bump');
      setTimeout(() => qtyEl.classList.remove('bump'), 250);
    }
  }

  toast(isNew ? '✓ ' + code : '✓ ' + code + '  ×' + items[code], 'ok');
}

function addManual() {
  const inp = document.getElementById('manualInput');
  const c = inp.value.trim();
  if (!c) { toast('Inserisci un codice', 'err'); return; }
  addCode(c);
  inp.value = '';
}

// ── UI UPDATES ────────────────────────────────────────────────────
function updateHeader() {
  const n = Object.keys(items).length;
  document.getElementById('headerCount').innerHTML =
    '<strong>' + n + '</strong> ' + (n === 1 ? 'codice' : 'codici');
  document.getElementById('listCount').textContent = n;
}

function updateTicker(code, qty) {
  const ticker = document.getElementById('ticker');
  ticker.classList.remove('empty');
  document.getElementById('tickerCode').textContent = code;
  document.getElementById('tickerQty').textContent = '×' + qty;
}

function updateListBtn() {
  const btn = document.getElementById('btnList');
  const hasItems = Object.keys(items).length > 0;
  btn.classList.toggle('has-items', hasItems);
}

// ── LIST PANEL ────────────────────────────────────────────────────
let listOpen = false;

function openList() {
  listOpen = true;
  document.getElementById('listPanel').classList.add('open');
  renderList();
}

function closeList() {
  listOpen = false;
  document.getElementById('listPanel').classList.remove('open');
}

function renderList() {
  const scroll = document.getElementById('listScroll');
  const empty  = document.getElementById('listEmpty');
  const keys   = itemOrder.filter(k => items[k] !== undefined);

  if (!keys.length) {
    empty.style.display = 'flex';
    [...scroll.children].forEach(c => { if(c !== empty) c.remove(); });
    return;
  }
  empty.style.display = 'none';
  [...scroll.children].forEach(c => { if(c !== empty) c.remove(); });

  // Most recent first (reverse insertion order)
  [...keys].reverse().forEach(code => {
    const d = document.createElement('div');
    d.className = 'list-item';
    d.dataset.code = code;
    d.innerHTML =
      `<div class="item-code">${esc(code)}</div>` +
      `<div class="item-qty-wrap"><div class="item-qty">${items[code]}</div></div>` +
      `<button class="item-del" onclick="delCode(${JSON.stringify(code)})">✕</button>`;
    scroll.appendChild(d);
  });
}

function delCode(code) {
  delete items[code];
  itemOrder = itemOrder.filter(k => k !== code);
  persist();
  updateHeader();
  updateListBtn();
  renderList();
  toast('Codice rimosso');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── EXPORT CSV ────────────────────────────────────────────────────
function exportCSV() {
  const keys = itemOrder.filter(k => items[k] !== undefined);
  if (!keys.length) { toast('Nessun codice da esportare', 'err'); return; }

  const BOM = '\uFEFF';
  const header = 'Codice,Quantita\r\n';
  const rows = keys.map(c => `${csvCell(c)},${items[c]}`).join('\r\n');

  const blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const ts = [
    now.getFullYear(),
    pad(now.getMonth()+1),
    pad(now.getDate()),
    '_',
    pad(now.getHours()),
    pad(now.getMinutes())
  ].join('');
  a.href = url;
  a.download = `barcode_${ts}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`CSV esportato — ${keys.length} codici`, 'ok');
}

function csvCell(v) {
  v = String(v);
  return (v.includes(',') || v.includes('"') || v.includes('\n'))
    ? '"' + v.replace(/"/g,'""') + '"'
    : v;
}
function pad(n) { return String(n).padStart(2,'0'); }

// ── CLEAR ─────────────────────────────────────────────────────────
function askClear() {
  if (!Object.keys(items).length) { toast('Lista già vuota', 'err'); return; }
  document.getElementById('sheetOv').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheetOv').classList.remove('open');
}
function doClear() {
  items = {}; itemOrder = [];
  persist(); updateHeader(); updateListBtn(); renderList();
  document.getElementById('ticker').classList.add('empty');
  document.getElementById('tickerCode').textContent = 'In attesa di scansione…';
  document.getElementById('tickerQty').textContent = '';
  closeSheet();
  toast('Lista svuotata');
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ── INIT ──────────────────────────────────────────────────────────
updateHeader();
updateListBtn();
</script>
</body>
</html>
